# sailor-r2 default configuration
# Combines SAILOR's pipeline settings with r2dreamer's world model

# -- General -------------------------------------------------------------------
seed: 0
deterministic_run: false
compile: true
device: "cuda:0"
debug: false
precision: 32
scratch_dir: "scratch_dir/"

# -- Logging -------------------------------------------------------------------
use_wandb: true
wandb_entity: "scaling-rl"
wandb_project: null
wandb_exp_name: null
log_every: 50

# -- Run params ----------------------------------------------------------------
train_dp_mppi: false
state_only: false
generate_highres_eval: false
update_dp: false

# -- Data params ---------------------------------------------------------------
num_exp_trajs: -1
num_exp_val_trajs: 1
normalize_state_actions: false
image_size: 64
obs_horizon: 2
action_horizon: 1
pred_horizon: 8
num_buffer_transitions: 100000
state_dim: -1
action_dim: -1

# -- Evaluation ----------------------------------------------------------------
eval_num_runs: 50
visualize_eval: true

# -- Environment ---------------------------------------------------------------
task: null
num_envs: 10
time_limit: -1
action_repeat: 1

# -- World model (r2dreamer architecture) --------------------------------------
rep_loss: "r2dreamer"  # "r2dreamer" (Barlow Twins, no decoder) or "dreamer" (reconstruction)
barlow_lambd: 5e-4

# RSSM dimensions
dyn_hidden: 512
dyn_deter: 512
dyn_stoch: 32
dyn_discrete: 32
dyn_rec_depth: 1
rssm_blocks: 8        # block GRU blocks (r2dreamer specific)

# Encoder/decoder
cnn_depth: 32
units: 512
act: "SiLU"
norm: true

# KL loss
dyn_scale: 0.5
rep_scale: 0.1
kl_free: 1.0
unimix_ratio: 0.01
initial: "learned"

# Optimiser (r2dreamer LaProp + AGC)
model_lr: 1e-4
agc: 0.3
agc_pmin: 1e-3
opt_eps: 1e-8
grad_clip: 1000
opt: "adam"
weight_decay: 0.0

# -- Heads ---------------------------------------------------------------------
reward_EMA: true
reward_head:
  layers: 2
  dist: "normal_std_fixed"
  outscale: 0.0
cont_head:
  layers: 2
  loss_scale: 1.0
  outscale: 1.0
grad_heads: ["decoder", "cont"]

# -- Critic (distributional ensemble) -----------------------------------------
critic:
  num_models: 5
  num_subsample: 2
  layers: 2
  dist: "symexp_twohot"
  slow_target: true
  slow_target_update: 1
  slow_target_fraction: 0.02
  lr: 3e-5
  eps: 1e-5
  grad_clip: 100.0
  outscale: 0.0

# -- Training ------------------------------------------------------------------
batch_size: 16
batch_length: 32
discount: 0.99
discount_lambda: 0.95
imag_horizon: 7

# -- Diffusion policy ----------------------------------------------------------
dp:
  train_steps: 1000000
  batch_size: 256
  lr: 0.0001
  max_iterations: 500000
  log_freq: 100
  eval_freq: 5000
  schedule_freq: 1
  devices: 1
  device: "cuda:0"
  seed: 292285
  action_space: "deltas"
  ac_chunk: 8
  img_chunk: 2
  num_cams: 2
  train_transform: "gpu_medium"
  debug: false
  print_config: false
  pretrained_ckpt: ""
  shared_mlp: []
  use_if_ckpt_present: false

# -- MPPI ----------------------------------------------------------------------
mppi:
  iterations: 6
  num_elites: 32
  temperature: 0.5
  num_samples: 256
  init_std: 0.05
  abs_residual: 0.2
  max_std: 0.1
  min_std: 0.01
  uncertainty_cost: 1.0
  action_l2_cost: 0
  reliability_mode: "mask"
  reliability_cost_weight: 1.0
  reliability_threshold: 0.5
  horizon: 8
  discount: 0.99
  pretrained_ckpt: ""

# -- SAILOR training pipeline -------------------------------------------------
train_dp_mppi_params:
  force_warmup: true
  warmstart_percentage_env_steps: 0.2
  warmstart_train_ratio: 1.5
  n_env_steps: null
  min_env_steps_per_round: 3500
  rounds_train_ratio: 1.5
  data_collect_noise_std: 0.1
  eval_every_round: 10
  update_dp_every: 10
  n_dp_train_itrs: 1000
  n_traj_to_relabel_per_round: 64
  n_dp_traj_buffer_size: 64
  dp_expert_buffer_ratio: 0.5
  use_discrim: true
  discrim_state_only: true
  upate_discrim_every: 100

# -- Unreliable region experiment ----------------------------------------------
unreliable_region:
  enabled: false
  oracle_avoidance: false
  axis: 1
  threshold: 0.0
  side: "positive"
  phases: "2,3"
